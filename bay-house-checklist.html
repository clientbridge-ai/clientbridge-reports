<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POC Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal: #0F6E56;
    --teal-light: #E1F5EE;
    --teal-mid: #1D9E75;
    --teal-dark: #085041;
    --red-light: #FCEBEB;
    --red: #A32D2D;
    --text: #1a1a1a;
    --muted: #666;
    --border: #e0e0e0;
    --bg: #f7f6f3;
    --white: #ffffff;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  header {
    background: var(--teal-dark);
    padding: 28px 24px 24px;
    text-align: center;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    color: #fff;
    font-weight: 400;
    letter-spacing: 0.01em;
  }

  header p {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    margin-top: 4px;
  }

  .container { max-width: 560px; margin: 0 auto; padding: 0 16px; }

  .name-bar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .name-bar label { font-size: 13px; color: var(--muted); white-space: nowrap; }

  .name-bar input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    outline: none;
  }

  .name-bar input:focus { border-color: var(--teal); }

  .progress-wrap {
    padding: 16px 16px 0;
    max-width: 560px;
    margin: 0 auto;
  }

  .progress-track {
    height: 5px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 6px;
  }

  .progress-fill {
    height: 100%;
    background: var(--teal-mid);
    border-radius: 99px;
    transition: width 0.3s ease;
    width: 0%;
  }

  .progress-label { font-size: 12px; color: var(--muted); }

  .section {
    max-width: 560px;
    margin: 20px auto 0;
    padding: 0 16px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .section-header h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    font-weight: 400;
    color: var(--teal-dark);
  }

  .section-header .line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 13px 16px;
    border-top: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .item:first-child { border-top: none; }
  .item:active { background: var(--bg); }

  .checkbox {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-radius: 5px;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, background 0.15s;
  }

  .checkbox svg { display: none; }

  .item.checked .checkbox {
    background: var(--teal);
    border-color: var(--teal);
  }

  .item.checked .checkbox svg { display: block; }

  .item label {
    font-size: 15px;
    line-height: 1.5;
    color: var(--text);
    cursor: pointer;
    flex: 1;
    transition: color 0.15s;
  }

  .item.checked label {
    color: #aaa;
    text-decoration: line-through;
  }

  .actions {
    max-width: 560px;
    margin: 24px auto 0;
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .btn-submit {
    background: var(--teal);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 15px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: background 0.15s;
  }

  .btn-submit:hover { background: var(--teal-dark); }
  .btn-submit:disabled { background: #ccc; cursor: not-allowed; }

  .btn-reset {
    background: none;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    width: 100%;
    transition: background 0.15s;
  }

  .btn-reset:hover { background: var(--border); }

  .toast {
    display: none;
    border-radius: 10px;
    padding: 13px 16px;
    font-size: 14px;
    font-weight: 500;
    line-height: 1.4;
  }

  .toast.success { display: block; background: var(--teal-light); color: var(--teal-dark); }
  .toast.error { display: block; background: var(--red-light); color: var(--red); }

  .warn {
    display: none;
    font-size: 13px;
    color: var(--red);
  }

  .notion-link {
    text-align: center;
    font-size: 13px;
    color: var(--teal);
    text-decoration: none;
    display: block;
    margin-top: 4px;
  }

  .notion-link:hover { text-decoration: underline; }

  @media (max-width: 400px) {
    header h1 { font-size: 22px; }
    .item label { font-size: 14px; }
  }
</style>
</head>
<body>

<header>
  <h1>POC Checklist</h1>
  <p>Complete before leaving</p>
</header>

<div class="name-bar">
  <label for="name">Name</label>
  <input type="text" id="name" placeholder="Who's closing up?" autocomplete="given-name">
</div>

<div class="progress-wrap">
  <div class="progress-track"><div class="progress-fill" id="bar"></div></div>
  <div class="progress-label" id="prog">0 of 22 complete</div>
</div>

<div class="section">
  <div class="section-header">
    <h2>Boat</h2>
    <div class="line"></div>
  </div>
  <div class="card">
    <div class="item" onclick="toggle(this)">
      <div class="checkbox"><svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <label>Fill gas tank with ethanol-free fuel — add 1 oz Ring Free per 10 gallons</label>
    </div>
    <div class="item" onclick="toggle(this)">
      <div class="checkbox"><svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <label>Gas tank cap secured</label>
    </div>
    <div class="item" onclick="toggle(this)">
      <div class="checkbox"><svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <label>Engine flushed — confirm flush port is reconnected</label>
    </div>
    <div class="item" onclick="toggle(this)">
      <div class="checkbox"><svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <label>Rope and boat hosed down to remove all salt and dirt</label>
    </div>
    <div class="item" onclick="toggle(this)">
      <div class="checkbox"><svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <label>Spray CorrosionX on steering bar and metal components</label>
    </div>
    <div class="item" onclick="toggle(this)">
      <div class="checkbox"><svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <label>Clean coolers and live well — open drains and prop open</label>
    </div>
    <div class="item" onclick="toggle(this)">
      <div class="checkbox"><svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <label>Battery switch off</label>
    </div>
    <div class="item" onclick="toggle(this)">
      <div class="checkbox"><svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <label>Key put away</label>
    </div>
    <div class="item" onclick="toggle(this)">
      <div class="checkbox"><svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <label>Boat closet locked</label>
    </div>
  </div>
</div>

<div class="section">
  <div class="section-header">
    <h2>House</h2>
    <div class="line"></div>
  </div>
  <div class="card">
    <div class="item" onclick="toggle(this)">
      <div class="checkbox"><svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <label>All lights off</label>
    </div>
    <div class="item" onclick="toggle(this)">
      <div class="checkbox"><svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <label>Thermostats set to 75°</label>
    </div>
    <div class="item" onclick="toggle(this)">
      <div class="checkbox"><svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <label>Trash taken out</label>
    </div>
    <div class="item" onclick="toggle(this)">
      <div class="checkbox"><svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <label>Empty all interior trash cans</label>
    </div>
    <div class="item" onclick="toggle(this)">
      <div class="checkbox"><svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <label>Remove any fish from fridge or freezer</label>
    </div>
    <div class="item" onclick="toggle(this)">
      <div class="checkbox"><svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <label>Change sheets with clean ones</label>
    </div>
    <div class="item" onclick="toggle(this)">
      <div class="checkbox"><svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <label>Wash dirty sheets or put in laundry</label>
    </div>
    <div class="item" onclick="toggle(this)">
      <div class="checkbox"><svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <label>Put dirty towels in laundry (wash if time allows)</label>
    </div>
    <div class="item" onclick="toggle(this)">
      <div class="checkbox"><svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <label>Fishing closet locked</label>
    </div>
    <div class="item" onclick="toggle(this)">
      <div class="checkbox"><svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <label>Patio doors locked — double check</label>
    </div>
    <div class="item" onclick="toggle(this)">
      <div class="checkbox"><svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <label>Back door locked — double check</label>
    </div>
    <div class="item" onclick="toggle(this)">
      <div class="checkbox"><svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <label>All other doors locked</label>
    </div>
  </div>
</div>

<div class="actions">
  <div class="toast" id="toast"></div>
  <div class="warn" id="warn">Please enter your name before submitting.</div>
  <button class="btn-submit" id="submitBtn" onclick="submitChecklist()">Submit to Notion</button>
  <button class="btn-reset" onclick="resetAll()">Reset checklist</button>
  <a class="notion-link" href="https://www.notion.so/84ccea054027402395da1edb1a802983" target="_blank">View submission log in Notion →</a>
</div>

<script>
const TOTAL = document.querySelectorAll('.item').length;
const DS_ID = 'aeea0bdc-54cc-4654-8849-b50039024016';

function toggle(el) {
  const isChecked = el.classList.toggle('checked');
  updateProgress();
}

function updateProgress() {
  const done = document.querySelectorAll('.item.checked').length;
  const pct = Math.round((done / TOTAL) * 100);
  document.getElementById('bar').style.width = pct + '%';
  document.getElementById('prog').textContent = done + ' of ' + TOTAL + ' complete';
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  if (type === 'success') setTimeout(() => { t.className = 'toast'; }, 6000);
}

async function submitChecklist() {
  const name = document.getElementById('name').value.trim();
  if (!name) {
    document.getElementById('warn').style.display = 'block';
    return;
  }
  document.getElementById('warn').style.display = 'none';

  const allItems = document.querySelectorAll('.item');
  const missed = [];
  let completed = 0;
  allItems.forEach(el => {
    if (el.classList.contains('checked')) {
      completed++;
    } else {
      missed.push(el.querySelector('label').textContent.trim());
    }
  });

  const now = new Date();
  const isoNow = now.toISOString().slice(0, 19);
  const label = name + ' — ' + now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  const status = missed.length === 0 ? 'All complete' : 'Items skipped';

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Submitting...';

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        mcp_servers: [{ type: 'url', url: 'https://mcp.notion.com/mcp', name: 'notion-mcp' }],
        messages: [{
          role: 'user',
          content: `Create a page in the Notion data source with ID "${DS_ID}" with these exact properties:
- Submission (title): "${label}"
- Submitted By: "${name}"
- date:Date & Time:start: "${isoNow}"
- date:Date & Time:is_datetime: 1
- Status: "${status}"
- Skipped Items: "${missed.join('; ')}"
- Total Completed: ${completed}

Respond only with: {"ok": true}`
        }]
      })
    });

    const data = await resp.json();
    const text = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
    if (text.includes('"ok": true') || text.includes('"ok":true')) {
      showToast('Logged to Notion — ' + label, 'success');
      resetAll();
      document.getElementById('name').value = '';
    } else {
      showToast('Something went wrong. Please try again.', 'error');
    }
  } catch (e) {
    showToast('Network error — check your connection and try again.', 'error');
  }

  btn.disabled = false;
  btn.textContent = 'Submit to Notion';
}

function resetAll() {
  document.querySelectorAll('.item').forEach(el => el.classList.remove('checked'));
  updateProgress();
}
</script>
</body>
</html>
